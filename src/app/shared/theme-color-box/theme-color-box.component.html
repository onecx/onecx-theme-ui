@if (properties()) {
  <div [class]="'p-inputtext theme-color-box flex p-0 ' + styleClass()">
    @if (generalProperties()) {
      <div
        class="theme-color"
        [style.background-color]="generalProperties()['primary-color']"
        [pTooltip]="'THEME.IMPORT.THEME_COLOR_PRIMARY' | translate"
        tooltipPosition="top"
        tooltipEvent="hover"
      ></div>
      <div
        class="theme-color"
        [style.background-color]="generalProperties()['secondary-color']"
        [pTooltip]="'THEME.IMPORT.THEME_COLOR_SECONDARY' | translate"
        tooltipPosition="top"
        tooltipEvent="hover"
      ></div>
      <div
        class="theme-color"
        [style.background-color]="generalProperties()['text-color']"
        [pTooltip]="'THEME.IMPORT.THEME_COLOR_TEXT' | translate"
        tooltipPosition="top"
        tooltipEvent="hover"
      ></div>
      <div
        class="theme-color"
        [style.background-color]="generalProperties()['body-bg-color']"
        [pTooltip]="'THEME.IMPORT.THEME_COLOR_BG' | translate"
        tooltipPosition="top"
        tooltipEvent="hover"
      ></div>
      <div
        class="theme-color"
        [style.background-color]="generalProperties()['content-bg-color']"
        [pTooltip]="'THEME.IMPORT.THEME_COLOR_CONTENT_BG' | translate"
        tooltipPosition="top"
        tooltipEvent="hover"
      ></div>
    }
    @if (topbarProperties()) {
      <div
        class="theme-color"
        [style.background-color]="topbarProperties()['topbar-bg-color']"
        [pTooltip]="'THEME.IMPORT.THEME_COLOR_TOPBAR_BG' | translate"
        tooltipPosition="top"
        tooltipEvent="hover"
      ></div>
      <div
        class="theme-color"
        [style.background-color]="topbarProperties()['topbar-text-color']"
        [pTooltip]="'THEME.IMPORT.THEME_COLOR_TOPBAR_TEXT' | translate"
        tooltipPosition="top"
        tooltipEvent="hover"
      ></div>
    }
    @if (sidebarProperties()) {
      <div
        class="theme-color"
        [style.background-color]="sidebarProperties()['menu-bg-color']"
        [pTooltip]="'THEME.IMPORT.THEME_COLOR_MENU_BG' | translate"
        tooltipPosition="top"
        tooltipEvent="hover"
      ></div>
      <div
        class="theme-color"
        [style.background-color]="sidebarProperties()['menu-item-text-color']"
        [pTooltip]="'THEME.IMPORT.THEME_COLOR_MENU_TEXT' | translate"
        tooltipPosition="top"
        tooltipEvent="hover"
      ></div>
    }
  </div>
}
